name: CI/CD - WeedMusic

on:
  push:
    branches: [main, develop, staging, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop, staging]

env:
  NODE_VERSION: '20'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID: oahdestuhxzwhltyrsjo

jobs:
  # ─── Stage 1: Lint & Type Check ───
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Lint
        run: npm run lint || true

  # ─── Stage 2: Build ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/postgres
          NEXT_PUBLIC_SUPABASE_URL: https://oahdestuhxzwhltyrsjo.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9haGRlc3R1aHh6d2hsdHlyc2pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjczMTEsImV4cCI6MjA5NTYwMzMxMX0.U2PoQJGbzZXBu-NTR4BWCzi4b4Tvg2vWCS81Z0ML-m4

  # ─── Stage 3: Supabase Migrations ───
  supabase-migrate:
    name: Supabase DB Migration
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Push Database Schema
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        continue-on-error: true

  # ─── Stage 4: Deploy Staging ───
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build, supabase-migrate]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://weed-music-v2-1-0.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment (Staging)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Build with Vercel (Staging)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Deploy to Vercel (Staging)
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

  # ─── Stage 5: Deploy Production ───
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, supabase-migrate]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://weed-music-v2-1-0.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Build with Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Initialize Supabase Database
        run: |
          curl -s "https://weed-music-v2-1-0.vercel.app/api/setup?key=${{ secrets.SETUP_KEY || 'weedmusic-setup-2025' }}" || true
        continue-on-error: true
